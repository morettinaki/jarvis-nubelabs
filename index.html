  <style>
    /* === BUTTON VISIBILITY FIX === */
    button:not(.md\:hidden){display:inline-flex;align-items:center;justify-content:center;gap:.4rem;border-radius:.5rem;font-weight:600;cursor:pointer;transition:all .2s ease}
    button:not([variant]):not(.md\:hidden){background:hsl(217,91%,55%);color:#fff;border:2px solid hsl(217,91%,55%);padding:.65rem 1.5rem;box-shadow:0 2px 10px hsl(217 91% 55% / .35)}
    button:not([variant]):not(.md\:hidden):hover{background:hsl(217,91%,47%);border-color:hsl(217,91%,47%);box-shadow:0 4px 18px hsl(217 91% 55% / .5);transform:translateY(-1px)}
    button[variant=outline]:not(.md\:hidden){background:transparent;color:hsl(217,91%,55%);border:2px solid hsl(217,91%,55%);padding:.65rem 1.5rem}
    button[variant=outline]:not(.md\:hidden):hover{background:hsl(217 91% 55% / .08);transform:translateY(-1px)}
    button.w-full:not(.md\:hidden){width:100%;padding:.75rem 1.5rem;justify-content:center}
    button a{color:inherit;text-decoration:none}

    /* === STICKY CTA BAR === */
    #jn-cta{position:fixed;top:0;left:0;right:0;z-index:200;background:linear-gradient(90deg,#1a56db,#4f46e5);padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:16px;box-shadow:0 2px 16px rgba(0,0,0,.3);height:44px}
    #jn-cta-text{color:rgba(255,255,255,.92);font-weight:500;font-size:14px;font-family:Manrope,sans-serif}
    #jn-cta-btn{background:#fff;color:#1a56db;font-weight:700;font-size:13px;padding:6px 18px;border-radius:6px;text-decoration:none;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.2);transition:all .2s;flex-shrink:0;font-family:Manrope,sans-serif}
    #jn-cta-btn:hover{background:#eff6ff;transform:translateY(-1px);box-shadow:0 4px 10px rgba(0,0,0,.25)}
    body{padding-top:44px!important}
    .fixed.top-0.left-0.right-0.z-50{top:44px!important}
    @media(max-width:640px){#jn-cta-text{display:none}}
  
    /* Fix overly tight letter-spacing on large headings */
    h1.tracking-tight, h2.tracking-tight { letter-spacing: -0.015em !important; }
    h2.font-extrabold { letter-spacing: -0.018em !important; }
    h1, h2, h3 { word-spacing: 0.04em; }
  
/* ===== MISSING TAILWIND UTILITIES FIX ===== */
/* Gap utilities */
.gap-8{gap:2rem}
.gap-12{gap:3rem}
.gap-x-12{column-gap:3rem}
/* Padding */
.p-7{padding:1.75rem}
.p-10{padding:2.5rem}
.py-1\.5{padding-top:0.375rem;padding-bottom:0.375rem}
/* Height */
.h-0\.5{height:0.125rem}
/* Text align */
.text-left{text-align:left}
/* Shadow */
.shadow{box-shadow:0 1px 3px 0 rgb(0 0 0/.1),0 1px 2px -1px rgb(0 0 0/.1)}
.hover\:shadow-lg:hover{box-shadow:0 10px 15px -3px rgb(0 0 0/.1),0 4px 6px -4px rgb(0 0 0/.1)}
/* Space-y */
.space-y-1\.5>:not([hidden])~:not([hidden]){margin-top:0.375rem}
/* Hover utilities */
.hover\:-translate-y-1:hover{transform:translateY(-0.25rem)}
.hover\:bg-muted\/50:hover{background-color:hsl(var(--muted)/.5)}
.hover\:bg-primary\/10:hover{background-color:hsl(var(--primary)/.1)}
.hover\:border-primary\/20:hover{border-color:hsl(var(--primary)/.2)}
.hover\:text-foreground:hover{color:hsl(var(--foreground))}
.hover\:text-muted-foreground:hover{color:hsl(var(--muted-foreground))}
/* Background opacity variants */
.bg-muted\/30{background-color:hsl(var(--muted)/.3)}
.bg-primary\/5{background-color:hsl(var(--primary)/.05)}
.bg-primary\/10{background-color:hsl(var(--primary)/.1)}
.bg-primary\/20{background-color:hsl(var(--primary)/.2)}
/* Border opacity variants */
.border-border\/50{border-color:hsl(var(--border)/.5)}
.border-primary\/20{border-color:hsl(var(--primary)/.2)}
.border-primary\/30{border-color:hsl(var(--primary)/.3)}
/* Text opacity variants */
.text-muted-foreground\/40{color:hsl(var(--muted-foreground)/.4)}

.text-muted-foreground\/60{color:hsl(var(--muted-foreground)/.6)}
.text-primary\/30{color:hsl(var(--primary)/.3)}
/* Fix button <a> with icon — inline-flex so SVG and text align side by side */

  <script>
    (function(){
      function fixBr(){
        document.querySelectorAll('h1 br,h2 br,h3 br').forEach(function(br){
          var p=br.previousSibling,n=br.nextSibling;
          if(p&&p.nodeType===3&&!p.textContent.endsWith(' '))p.textContent+=' ';
          if(n&&n.nodeType===3&&!n.textContent.startsWith(' '))n.textContent=' '+n.textContent;
        });
      }
      [150,600,1800].forEach(function(t){setTimeout(fixBr,t);});
      window.addEventListener('resize',fixBr);
    })();
  </script>
